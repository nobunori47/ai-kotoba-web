<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI ことば相談BOT - 結果</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }
    h1 { font-size: 24px; margin-bottom: 24px; }
    .box {
      background: white;
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 16px;
      line-height: 1.8;
    }
    .label {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }
    a {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>✅ 作成された文章</h1>

  <div class="box">
    <div class="label">あなたの状況</div>
    {{ situation }}
  </div>

  <div class="box">
    <div class="label">提案する文章</div>
    {{ result }}
  </div>

  <a href="/">← もう一度試す</a>
</body>
</html>
