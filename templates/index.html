<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AI ことば相談BOT</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    p {
      color: #666;
      margin-bottom: 24px;
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      resize: vertical;
    }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <h1>💬 AI ことば相談BOT</h1>
  <p>伝えにくいことを、上手に伝える文章を作ります。</p>

  <form action="/result" method="POST">
    <textarea name="situation" placeholder="例：上司に有給休暇を申請したいのですが、言いにくくて…"></textarea>
    <button type="submit">文章を作る</button>
  </form>
</body>
</html>
